        - question: What is Cross-Site Scripting (XSS)?
          answer: XSS is a dangerous security vulnerability where attackers inject malicious JavaScript into your site, typically via a form input or comment box. If that input is displayed to other users without HTML encoding, the attacker's script will execute in their browser, potentially stealing session cookies. Encoding entities neutralizes the script, rendering it as harmless text.
        - question: Should I encode data before saving it to a database?
