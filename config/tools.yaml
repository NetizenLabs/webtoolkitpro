      faq:
        - question: Why is Google Search Console telling me 'Sitemap contains errors'?
          answer: 'The most common reasons are: 1) Your sitemap contains more than 50,000 URLs, 2) The file size exceeds 50MB, 3) It is missing the required `xmlns` namespace declaration at the top of the file, or 4) One of the URLs contains an unescaped special character (like an ampersand) which breaks the XML structure.'
        - question: What is the difference between a Sitemap and a Sitemap Index?
          answer: A standard XML Sitemap lists up to 50,000 specific web pages. If your website is larger than that, you must split the pages into multiple sitemaps. A Sitemap Index is essentially a 'sitemap of sitemaps'—it lists the locations of those smaller sitemap files, allowing search engines to discover all of them.
        - question: Do I need an XML Sitemap if my website is very small?
          answer: If your site only has a few pages and is linked together with a standard navigation menu, Googlebot will likely find everything without a sitemap. However, submitting a sitemap guarantees that search engines know exactly which pages you consider important and when they were last updated.
