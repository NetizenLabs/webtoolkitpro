      entity_definition: What Is My IP Address is a real-time network diagnostic tool that identifies your public-facing internet identity. It detects your IP address (IPv4 or IPv6), approximate geographic location (City, Region, Country), and connection protocol. This tool is essential for verifying VPN connectivity and troubleshooting network configurations securely.
      how_it_works: The moment you load this page, our server intercepts the HTTP request sent by your browser. It parses the TCP/IP packet headers (specifically analyzing the `X-Forwarded-For` and `CF-Connecting-IP` headers if you are behind a proxy) to determine your public-facing IP address. It then cross-references this IP against a live global BGP routing table to determine your ISP, Country, Region, and City with high accuracy.
      use_cases:
        - Verifying that your VPN (Virtual Private Network) is functioning correctly and not leaking your true IP.
        - Providing your exact IP address to a System Administrator who needs to whitelist you in a corporate firewall.
        - Troubleshooting geo-restricted content blocks on streaming services like Netflix or Hulu.
        - Identifying your browser's precise User-Agent fingerprint for security auditing.
      features:
        - Simultaneous detection of both IPv4 and modern IPv6 network addresses.
        - Real-time geographical resolution using enterprise-grade GeoIP databases.
        - Instant ISP (Internet Service Provider) and ASN detection.
        - 100% secure—your IP is displayed to you and immediately discarded from our servers.
      faq:
        - question: Why does my IP address change periodically?
          answer: Most residential Internet Service Providers (ISPs) use 'Dynamic IPs', meaning they lease an IP address to your router for a specific duration. When your router reboots or the lease expires, you may be assigned a new IP address from their available pool.
        - question: Is my private network IP (like 192.168.1.1) the same as my public IP?
          answer: No. Your router assigns private IPs (usually starting with 192.168.x.x or 10.x.x.x) to devices inside your home network. However, when those devices access the internet, the router translates them all into one single 'Public IP' via a process called NAT (Network Address Translation). This tool shows your Public IP.
        - question: Can someone find my exact physical house address from my IP?
          answer: No. A public IP address can only provide an approximate location, typically narrowing it down to your city or the location of your ISP's nearest data center. It cannot pinpoint your exact street address.
