        - question: Why am I constantly getting a 'MISS'?
          answer: 'A ''MISS'' occurs if the file was not in the cache, or if your origin server sent headers explicitly forbidding caching (like `Cache-Control: no-cache` or `private`). It can also happen if the file is rarely requested, causing the CDN to evict it from memory.'
        - question: Is Brotli compression better than Gzip?
