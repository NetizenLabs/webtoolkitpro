        - question: What do the global (g) and multiline (m) flags change during validation testing?
          answer: The global flag (`g`) ensures the regex engine finds all matching occurrences across the string rather than stopping at the first instance. The multiline flag (`m`) alters line anchors (`^`) and (`$`) to match the beginning and end of individual lines within a text block, instead of treating the entire string as a single line.
        - question: Does this tester support regex syntaxes from alternative languages like PCRE (PHP) or Python?
          answer: This tool executes natively using the browser's JavaScript engine (ECMAScript RegExp rules). While the vast majority of core behaviors (literal characters, classes, and groups) align closely with PCRE and Python, minor language-specific anomalies—like specific lookbehind supports—may vary slightly.
