      faq:
        - question: Where exactly do I put the robots.txt file?
          answer: The `robots.txt` file MUST be placed in the top-level root directory of your web host. For example, if your site is `https://example.com`, the crawler will strictly look for the file at `https://example.com/robots.txt`. If you place it in a subfolder, search engines will completely ignore it.
        - question: Does blocking a page in robots.txt remove it from Google search results?
          answer: No, and this is a common SEO misconception. `robots.txt` prevents Google from *crawling* the page content, but if other sites link to that URL, Google can still *index* the URL and show it in search results (usually with a 'No information is available for this page' description). To completely block indexing, you must use a `<meta name='robots' content='noindex'>` tag on the page itself.
        - question: Can malicious bots just ignore my robots.txt?
          answer: Yes. The Robots Exclusion Protocol relies on the honor system. Respectable search engines (Google, Bing) and major AI companies (OpenAI) obey it strictly. However, malicious scrapers or spam bots will ignore it. For real security against malicious traffic, you must rely on server-level firewalls (WAF) or Cloudflare.
