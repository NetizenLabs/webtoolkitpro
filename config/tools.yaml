      entity_definition: HSTS Policy Generator is a security utility that creates the 'Strict-Transport-Security' header. This directive tells browsers that they should *only* communicate with your site via HTTPS, even if the user types 'http://'. This prevents 'Man-in-the-Middle' attacks and protocol downgrades.
