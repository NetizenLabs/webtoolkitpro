      faq:
        - question: What do the last two digits of an 8-digit Hex code represent?
          answer: The final two digits represent the 'Alpha' transparency channel. For example, in the code `#00000080`, the '80' is the hexadecimal equivalent of 50% opacity, making the black color half-transparent.
        - question: Are 8-digit Hex codes supported in all browsers?
          answer: Yes, 8-digit Hex codes have been fully supported in all major modern browsers (Chrome, Safari, Firefox, Edge) for several years. It is completely safe for production environments.
        - question: Why did my 0.5 alpha value become '80' instead of '50'?
          answer: Hexadecimal operates on a Base-16 scale from 0 to 255, not 0 to 100. Fifty percent of 255 is 127.5. When 128 is converted into hexadecimal math, the result is '80'.
