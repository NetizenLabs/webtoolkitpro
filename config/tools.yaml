      features:
        - Validates 5-field K8s-compliant cron expressions
        - Outputs modern `batch/v1` API structures
        - Automatically configures anti-pattern safeguards (restartPolicy, limits)
      faq:
        - question: Does Kubernetes support the 6-field cron expression?
          answer: No. Unlike some Linux distributions or Node.js libraries that support a 6th field for 'seconds', Kubernetes strictly requires the standard 5-field format (`Minute Hour DayOfMonth Month DayOfWeek`).
        - question: What restart policy is generated?
          answer: 'The generated manifest defaults to `restartPolicy: OnFailure`, which is the best practice for CronJobs to ensure transient failures are retried without infinitely looping crashed pods.'
    seo:
      title: Cron to Kubernetes CronJob — Convert Schedules
      description: Convert standard Linux Cron expressions into Kubernetes CronJob YAML manifests instantly. Scaffold batch jobs, backups, and scheduled tasks for your K8s cluster.
      keywords:
