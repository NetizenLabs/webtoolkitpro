    content:
      title: Secure JWT Decoder — Offline Token Inspection
      description: Secure JWT decoder for inspecting JSON Web Tokens locally. Inspect payloads, verify claims (iat, exp), and debug auth headers 100% offline—no data ever leaves your device.
      keywords:
        - jwt decoder offline
        - decode json web token locally
        - secure jwt debugger online
