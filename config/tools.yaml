        - question: If I 'Disallow' a page in robots.txt, is it completely hidden from Google?
          answer: No. A `robots.txt` file prevents a search engine from *crawling* the page. However, if another website links to that page, Google might still *index* the URL (showing it in search results without a description). If you want to completely hide a page from Google, you must use a `<meta name='robots' content='noindex'>` tag on the page itself.
