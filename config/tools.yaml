          answer: No. ROT13 offers zero actual cryptographic security. It is purely an obfuscation utility to hide spoilers or basic text lines from immediate reading.
        - question: Does it support capital letters?
          answer: Yes. Capital letters are rotated within the uppercase range (A-Z) and lowercase letters are rotated within the lowercase range (a-z).
    seo:
