    content:
      title: Broken Link Checker — Technical SEO Auditor
      description: Scan your website for dead links and 404 errors. Improve your search rankings and user experience by identifying broken paths instantly.
      entity_definition: |
        The Broken Link Checker is a foundational Technical SEO utility designed for webmasters, content marketers, and SEO specialists. Dead links (404 errors) severely degrade user experience, interrupt the flow of PageRank (link equity), and signal to search engines like Google that a website is poorly maintained. This tool acts as an automated auditor, rapidly scanning a given webpage to extract every internal and external hyperlink, verifying their HTTP status codes to ensure your website architecture remains pristine.
      how_it_works: |
        Operating server-side via a secure proxy, the engine fetches the HTML payload of your target URL. It utilizes DOM-parsing algorithms to extract every `<a>` (anchor) tag `href` attribute. It then executes asynchronous HTTP `HEAD` requests to every extracted URL simultaneously. It captures the response headers and categorizes the links into Success (200), Redirects (301/302), Client Errors (404/403), or Server Errors (500), displaying the results in a clean, filterable dashboard.
      use_cases:
        - Conducting post-launch audits of a newly redesigned website to ensure legacy URLs were correctly 301 redirected.
        - Maintaining the integrity of massive, long-form blog posts that link to external resources that may have gone offline over time.
        - Identifying broken image links or missing CSS/JS assets that are quietly degrading the visual user experience.
        - Reclaiming lost SEO link juice by finding and fixing dead internal links pointing to deleted product pages.
      features:
        - Rapid, asynchronous crawling capable of checking hundreds of links in seconds.
        - Categorization of HTTP status codes (200 OK, 301 Permanent Redirect, 404 Not Found).
        - Differentiation between Internal (same domain) and External (off-site) links.
        - Exportable reports for integration into broader SEO audit workflows.
      faq:
        - question: Why are broken links bad for SEO?
          answer: Search engines like Google use 'spiders' to crawl websites by following links. If they encounter a 404 dead end, the crawl stops, and 'link equity' (ranking power) is wasted. Furthermore, a high volume of broken links indicates to Google that the site is abandoned, which can lower your overall domain authority.
        - question: What is the difference between a 301 and a 302 redirect?
          answer: A 301 is a 'Permanent Redirect'. It tells Google to transfer 100% of the SEO ranking power from the old link to the new link. A 302 is a 'Temporary Redirect', which tells Google to keep the old link indexed because the change is not permanent. Using 302s accidentally is a massive SEO mistake.
        - question: Can this tool crawl my entire website at once?
          answer: This specific tool is designed for deep, single-page audits (e.g., checking a specific massive blog post or a complex homepage). To crawl an entire domain (thousands of pages), you should use a dedicated desktop spider like Screaming Frog or Sitebulb.
    meta:
      title: Broken Link Checker — Technical SEO Auditor
      description: Scan your website for dead links and 404 errors. Improve your search rankings and user experience by identifying broken paths instantly.
    seo:
      title: Broken Link Checker — Find 404 Errors
      description: Scan your website for broken links and 404 errors. Improve user experience and SEO rankings by identifying and fixing dead outgoing and internal URLs.
      keywords:
        - broken link checker
        - find 404 errors
        - dead link scanner
        - seo link auditor
        - check internal links
      tldr: Scan a list of URLs or a webpage to instantly identify dead, broken, or 404 links.
      entity_definition: The Broken Link Checker is a site maintenance and SEO utility. Over time, external websites shut down and internal pages are moved, resulting in "Link Rot." Search engines penalize sites with a high density of dead (404 Not Found) links because they create a frustrating user experience. This tool executes parallel HTTP HEAD requests against an array of URLs, analyzing the server response codes to explicitly flag 404s, 500 Server Errors, and infinite redirect loops.
    faqs:
      - question: What is an HTTP HEAD request?
        answer: A standard GET request downloads the entire webpage. A HEAD request asks the server to ONLY return the HTTP status code (e.g., 200 OK or 404 Not Found). This makes checking hundreds of links exponentially faster and uses significantly less bandwidth.
      - question: Do broken links hurt SEO?
        answer: Yes. Google's algorithm views a site littered with broken links as abandoned or poorly maintained, which directly degrades the overall quality score and search ranking of the entire domain.
      - question: What is a 500 error?
        answer: A 500 Internal Server Error means the link you are pointing to is technically correct, but the destination server has crashed or failed to process the request on their end.
