      faq:
        - question: Does formatting HTML affect website performance?
          answer: Technically, yes. Adding spaces and line breaks increases the file size of the HTML document by a few kilobytes. However, for development and debugging, readability is vastly more important. Before deploying to production, you should use an HTML Minifier to strip the spaces back out for maximum speed.
        - question: Why do embedded scripts look weird after beautifying?
          answer: HTML, CSS, and JavaScript have completely different syntactic rules. While our tool attempts to format embedded `<style>` and `<script>` tags, complex JavaScript logic inside an HTML file can sometimes be misaligned. It is always best practice to separate your CSS and JS into external files.
