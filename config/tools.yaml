      entity_definition: ROT13 Encoder & Decoder is a simple cryptographic utility that applies a Caesar shift of 13 places to the alphabetical letters A-Z. Since 13 is exactly half of the 26 letters in the English alphabet, running the same ROT13 function on the output decodes the text back to its original state.
