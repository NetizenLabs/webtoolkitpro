        - Identifying the card brand (Visa, Mastercard, Discover) instantly from a raw string of numbers.
      features:
        - Instant, zero-latency Luhn algorithm (Mod-10) checksum verification.
        - Automatic Major Industry Identifier (MII) detection for Visa, AMEX, Mastercard, Discover, and JCB.
        - Graceful handling of spaces and dashes within the input string.
        - 100% offline execution; sensitive financial data never leaves your device.
      faq:
        - question: Is it safe to type my real credit card number here?
          answer: Yes, it is mathematically safe because the tool runs 100% client-side in your browser; no data is sent over the internet. However, as a general security best practice, you should *never* paste your real credit card number into random internet forms unless you are actively making a purchase on a trusted site.
        - question: If it says valid, does that mean the card has money on it?
          answer: No. This tool only performs a mathematical checksum (the Luhn algorithm) to verify that the string of numbers is formatted correctly. It does not connect to any banking APIs. To know if a card will decline or accept a charge, you must use a payment processor.
        - question: How does it know the card brand?
          answer: Credit cards begin with specific Issuer Identification Numbers (IIN). For example, numbers starting with `4` are always Visa, numbers starting with `34` or `37` are American Express, and `51` through `55` are Mastercard.
