      faq:
        - question: Are percentage increases and decreases reversible?
          answer: No, and this is a common mathematical trap! If a $100 stock increases by 50%, it goes to $150. If that $150 stock then decreases by 50%, it drops to $75, not back to $100. Always recalculate relative to the new base number.
        - question: How do you calculate percentage difference vs percentage change?
          answer: Percentage 'Change' tracks a single value over time (Old Value vs New Value). Percentage 'Difference' compares two completely separate items (like comparing the height of two different buildings) by dividing the absolute difference by their average.
        - question: Why do floating-point percentages sometimes look weird in JavaScript?
          answer: JavaScript uses IEEE 754 double-precision floats, which cannot perfectly represent certain decimals (e.g., `0.1 + 0.2 = 0.30000000000000004`). Our calculator includes special rounding algorithms to normalize these floating-point artifacts into clean, human-readable percentages.
