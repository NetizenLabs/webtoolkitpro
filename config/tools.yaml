      faq:
        - question: What does 'Lorem Ipsum' actually mean?
          answer: It is a scrambled, non-sensical derivative of a passage from Cicero's 'De finibus bonorum et malorum' (The Extremes of Good and Evil), written in 45 BC. The original phrase 'Neque porro quisquam est qui dolorem ipsum' translates to 'There is no one who loves pain itself'. Over centuries of typesetting, the words were scrambled to become meaningless.
        - question: Why use Latin instead of English for placeholder text?
          answer: Human brains are wired to read words. If you use English placeholder text (like 'Insert copy here'), clients will read the words and critique the copy instead of looking at your design. Latin text provides the visual weight of language but forces the viewer to focus purely on typography and layout.
        - question: Will search engines index my site if I leave Lorem Ipsum on it?
          answer: Yes, and that is a bad thing. Google's algorithms can detect standard placeholder text and may flag your site as 'under construction' or low quality. Always ensure you replace dummy text with real content before pushing a website to production.
