      entity_definition: The Robots.txt Templates utility is an expert-curated repository of configurations for the 'Robots Exclusion Protocol'. The `robots.txt` file is the fundamental gatekeeper of your website's technical SEO; it explicitly tells search engine crawlers (like Googlebot) and automated scrapers which pages they are allowed to scan. This tool eliminates the guesswork by providing battle-tested, framework-specific templates designed to protect sensitive routes, optimize crawl budget, and block aggressive AI scraping bots.
      how_it_works: The tool presents a library of tailored configurations based on your CMS or framework (e.g., WordPress, Next.js, Shopify). Each template contains pre-written `User-agent`, `Allow`, and `Disallow` directives specifically mapped to that platform's known architecture. You simply select your platform, copy the precise ruleset, and paste it into your server's root directory.
      use_cases:
        - Securing a new WordPress deployment by explicitly blocking crawlers from `/wp-admin/` and `/xmlrpc.php`.
        - Optimizing a massive Next.js e-commerce site's 'crawl budget' by preventing Google from scanning thousands of dynamic `/search?query=` URLs.
