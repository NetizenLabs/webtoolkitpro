        - Creating a step-by-step technical roadmap to resolve a sudden drop in organic search traffic caused by high INP.
        - Providing non-technical stakeholders with a clear explanation of why backend server upgrades are necessary for SEO.
      features:
        - Updated 2026 metric thresholds (including the strict new INP requirements).
        - Interactive visual components demonstrating layout shifts and rendering blocks.
        - Actionable, code-level remediation strategies for Next.js, React, and Vanilla JS.
        - A curated list of Chrome DevTools workflows for auditing performance.
      faq:
        - question: What is Largest Contentful Paint (LCP)?
          answer: LCP measures loading performance by tracking the exact millisecond when the largest text block or image element becomes fully visible in the viewport. To provide a good user experience and pass Google's assessment, your LCP must occur within 2.5 seconds of the page starting to load.
        - question: How is INP different from FID?
          answer: First Input Delay (FID) only measured the delay of the *first* interaction on a page. Google replaced it with Interaction to Next Paint (INP) because INP measures the latency of *all* click, tap, and keyboard interactions throughout the entire lifespan of the user's visit. A 'Good' INP must be under 200 milliseconds.
        - question: Why is my CLS score so high?
          answer: Cumulative Layout Shift (CLS) occurs when elements on your page suddenly move while the user is trying to read or click. This is almost always caused by images loading without explicit `width` and `height` attributes, or web fonts causing 'Flash of Unstyled Text' (FOUT) resizing. A passing CLS score must be 0.1 or less.
    seo:
      title: Core Web Vitals Guide — LCP, INP, and CLS Explained
      description: An interactive guide to Google's Core Web Vitals. Learn how to diagnose and fix poor Largest Contentful Paint (LCP), INP, and Cumulative Layout Shifts (CLS).
      keywords:
        - core web vitals
        - improve lcp
        - fix cls
        - interaction to next paint
        - google pagespeed guide
      tldr: An interactive developer handbook for understanding and fixing Core Web Vitals.
      entity_definition: The Core Web Vitals Guide is an educational reference utility for technical SEO. Introduced by Google in 2020, Core Web Vitals are a subset of performance metrics strictly tied to user experience and search engine ranking. The three pillars—Largest Contentful Paint (LCP, measuring loading speed), Interaction to Next Paint (INP, measuring responsiveness), and Cumulative Layout Shift (CLS, measuring visual stability)—require specific front-end engineering techniques (like preloading and asynchronous JavaScript) to optimize.
    faqs:
      - question: What is a good LCP score?
        answer: Google defines a "Good" Largest Contentful Paint as occurring within 2.5 seconds of the page starting to load. Anything over 4.0 seconds is considered "Poor".
      - question: How do I fix a bad CLS score?
        answer: Cumulative Layout Shift usually happens when images load without explicit width and height attributes, causing the text to jump around. Always define dimensions for media and ads.
      - question: What replaced First Input Delay (FID)?
        answer: Interaction to Next Paint (INP) officially replaced FID in March 2024. INP is a much stricter metric that measures the latency of *all* user interactions on a page, not just the first one.
