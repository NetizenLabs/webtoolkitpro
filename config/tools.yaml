      entity_definition: Critical Path CSS Generator is a performance utility that identifies and extracts the minimum CSS required to render the initial viewport of a webpage. By inlining this CSS in the <head> and deferring the rest of the stylesheet, developers can eliminate 'render-blocking' delays and significantly improve the Largest Contentful Paint (LCP) metric.
      how_it_works: The tool simulates a viewport-specific render of the page and isolates the CSS rules that affect elements visible on the initial screen load.
