        - IncludeSubDomains support
        - Preload directive integration
        - Nginx and Apache config snippets
      faq:
        - question: What is HSTS Preloading?
          answer: It is a list built into browsers that tells them to use HTTPS for your domain before the first time a user even visits your site.
        - question: Can HSTS break my site?
          answer: Yes, if you enable HSTS and then lose your SSL certificate, users will be unable to access your site until the max-age expires. Start with a short duration first.
    seo:
      title: HSTS Policy Generator — Strict-Transport-Security
      description: Generate an HTTP Strict Transport Security (HSTS) header policy. Protect your users from man-in-the-middle attacks and SSL stripping by forcing HTTPS connections.
      keywords:
