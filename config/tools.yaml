          answer: It is an HTML element that tells search engines which version of a URL is the original one.
        - question: Can I have multiple canonicals on one page?
          answer: No. Having more than one canonical tag can confuse search engines and lead to them ignoring both.
    seo:
      title: Canonical Tag Checker — Prevent Duplicate Content
      description: Inspect canonical tags to resolve duplicate content issues. Verify that your rel="canonical" attributes are correctly pointing search engines to the master page.
      keywords:
        - canonical tag checker
        - check rel canonical
        - duplicate content seo tool
