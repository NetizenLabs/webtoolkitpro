      faq:
        - question: Is NanoID better than UUID v4?
          answer: For most modern web applications, yes. NanoID offers the exact same collision resistance as UUID v4 but is 40% smaller and generates 60% faster in JavaScript environments. UUID is still preferred if your specific SQL database has a dedicated, highly-optimized `UUID` column type.
        - question: What does 'URL-safe' mean?
          answer: A URL-safe string only contains characters that do not need to be URL-encoded (like `%20` for spaces). NanoID specifically uses `A-Za-z0-9_-`, ensuring that the generated ID will never accidentally break a URL structure or routing logic.
        - question: If I make the NanoID shorter, is it still secure?
          answer: Making the ID shorter exponentially increases the risk of a collision (generating a duplicate). For production databases, you should stick to the default 21 characters. You should only reduce the length (e.g., to 10 characters) if you are building a system with a very small, short-lived dataset, like a temporary game lobby.
