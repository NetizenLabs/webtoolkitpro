      entity_definition: The PHP Serializer & Deserializer is an advanced debugging tool for backend developers. PHP uses a highly specific, proprietary format (like `a:2:{s:4:"name";s:3:"Bob";}`) to store arrays and objects in databases or session files. While powerful for servers, this format is incredibly difficult for humans to read or edit. This tool acts as a bi-directional translator. It safely 'unserializes' the raw PHP string into clean, readable JSON. You can then easily edit the JSON, and our tool will re-serialize it back into the strict PHP format.
      how_it_works: Our tool utilizes a robust JavaScript port of PHP's native `serialize()` and `unserialize()` functions. It parses the specific string-length markers (e.g., `s:4`) and array counters (e.g., `a:2`) locally in your browser, mapping them directly to equivalent JSON objects and arrays without needing a backend server.
      use_cases:
        - Debugging and manually editing corrupted WordPress `wp_options` database tables.
        - Inspecting raw PHP session files to verify user authentication states.
        - Migrating legacy PHP applications to Node.js or Python by translating their data blobs to JSON.
        - Testing payload injections for PHP Object Injection vulnerabilities during security audits.
      features:
        - 'Bi-directional conversion: PHP to JSON, and JSON to PHP.'
        - Strict syntax validation that instantly flags missing brackets or incorrect string length markers.
        - Handles complex multidimensional arrays and standard object mapping.
        - 100% offline local execution, keeping your database dumps secure.
      faq:
        - question: Why is the serialized string throwing a syntax error?
          answer: PHP serialization is incredibly fragile. It relies on strict byte-length markers (like `s:5:"apple"`). If you manually edit the word 'apple' to 'orange' (which is 6 letters) but forget to change the `s:5` to `s:6`, the entire string corrupts and will fail to parse.
        - question: Does this tool support custom PHP Classes?
          answer: Yes and no. It will successfully parse custom class objects (indicated by `O:ClassName`), but because the tool runs in JavaScript, it converts them into generic JSON objects. When you re-serialize them, they will remain generic objects rather than retaining their original custom class bindings.
        - question: Can I use this to fix a broken WordPress database?
          answer: Yes! A common issue when migrating WordPress sites is that changing URLs alters the string length, which breaks the serialization in the database. You can paste the broken blob here, fix the string lengths, convert it to JSON, and re-serialize it safely.
      technical_specs:
        - label: Library
          value: php-serialize
        - label: Execution
          value: Local Browser
