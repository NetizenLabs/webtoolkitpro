        - question: Where should I place the generated JSON-LD code?
          answer: |
            Google's guidelines state that the generated `<script type="application/ld+json">` block can be safely placed in either the `<head>` or the `<body>` of your HTML document.  However, best practice is to inject it into the `<head>` to ensure it is parsed immediately when the crawler loads the page, avoiding any issues with asynchronous JavaScript rendering or deferred body loading.
