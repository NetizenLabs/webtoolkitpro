        - Live 'Current Epoch' clock for instant copy-pasting.
        - 100% offline, browser-based execution for zero latency.
      faq:
        - question: What exactly is the Unix Epoch?
          answer: The Unix Epoch is midnight on January 1, 1970, Coordinated Universal Time (UTC). It was chosen by early computer scientists as an arbitrary 'Zero Hour'. Every Unix timestamp simply counts the number of seconds that have passed since that exact moment, completely ignoring leap seconds.
        - question: Why does JavaScript use 13 digits instead of 10?
          answer: Standard Unix time counts in seconds (a 10-digit number like 1700000000). However, JavaScript's `Date.now()` API counts in milliseconds for higher precision, resulting in a 13-digit number. This converter automatically detects the length and applies the correct math to avoid returning dates in the year 55,000.
        - question: What is the Year 2038 problem?
          answer: Often called the 'Y2K38 bug', it refers to the moment when the Unix timestamp will exceed the maximum value of a 32-bit signed integer (2,147,483,647). At 03:14:07 UTC on January 19, 2038, unpatched 32-bit systems will 'roll over' to a negative number, interpreting the year as 1901. Modern 64-bit systems have resolved this issue.
