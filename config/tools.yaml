      how_it_works: The converter parses your standard JSON array, validates that each index is a true object, and reconstructs the data by stringifying each object on a separated newline.
      use_cases:
        - Formatting datasets for OpenAI GPT-4 fine-tuning
        - Preparing data for HuggingFace Transformers
        - Managing massive log files in BigQuery or ElasticSearch
      features:
        - 100% client-side dataset processing (Secure & Private)
        - Strict validation of JSON objects
        - One-click copy or direct .jsonl file download
      faq:
        - question: What is the difference between JSON and JSONL?
          answer: Standard JSON wraps objects in an array structure `[{}, {}]`. JSONL (JSON Lines) removes the array brackets and commas, placing each distinct JSON object on its own line.
        - question: Why do AI models require JSONL?
          answer: AI fine-tuning datasets can be gigabytes in size. JSONL allows parsers to stream the file line-by-line without loading the entire structure into RAM, preventing memory crashes.
