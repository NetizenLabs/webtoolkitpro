        - Instant, bi-directional encoding and decoding with a single click.
        - 100% client-side execution ensuring sensitive API keys or parameters never leave your browser.
      faq:
        - question: Why do spaces in my URL turn into `%20` or `+`?
          answer: Spaces are not allowed in valid URLs because they can break HTTP request headers. The standard percent-encoding for a space character is `%20`. In some specific contexts (like form data submissions), a space is encoded as a `+` symbol, but `%20` is the universally safer choice for general URLs.
        - question: What is the difference between `encodeURI` and `encodeURIComponent`?
          answer: '`encodeURI` is meant for encoding a full, complete URL; it ignores structural characters like `/`, `?`, and `&` so the link still works. `encodeURIComponent` is much more aggressive and is used to encode a *single parameter* inside a URL. It encodes `/`, `?`, and `&` to prevent those characters from accidentally creating new, unintended parameters.'
        - question: Can a URL be double-encoded by mistake?
          answer: Yes. If you run a string through an encoder twice, the `%` symbol from the first encoding will itself be encoded into `%25` (e.g., `%20` becomes `%2520`). This causes broken links and server errors. Always ensure you are only encoding raw strings once.
